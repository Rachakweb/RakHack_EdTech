<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RakHack Corporate Portal</title>
    <style>
        body {
            background-color: #050505;
            color: #e5e5e5;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-container {
            background: #0a0a0a;
            border: 1px solid rgba(255, 0, 60, 0.5);
            padding: 40px;
            border-radius: 4px;
            width: 400px;
            box-shadow: 0 0 25px rgba(255, 0, 60, 0.1);
            position: relative;
        }

        .login-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            opacity: 0.5;
        }

        h2 {
            color: #ff003c;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 0, 60, 0.3);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
            z-index: 10;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 10px;
            background: #050505;
            border: 1px solid #333;
            color: #fff;
            font-family: inherit;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #ff003c;
            box-shadow: inset 0 0 5px rgba(255, 0, 60, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #ff003c;
            color: #ff003c;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
            position: relative;
            z-index: 10;
        }

        button:hover {
            background: #ff003c;
            color: #000;
        }

        #message {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            min-height: 40px;
            white-space: pre-wrap;
            word-break: break-all;
            position: relative;
            z-index: 10;
        }

        .success { color: #00ffff; text-shadow: 0 0 5px rgba(0,255,255,0.5); }
        .error { color: #ff003c; }

        .scanlines {
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 2px;
            z-index: 999;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="login-container">
        <h2>Corp_Admin_Portal</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Administrator Username</label>
                <input type="text" id="username" name="username" autocomplete="off" placeholder="admin">
            </div>
            <div class="form-group">
                <label for="password">Authentication Token</label>
                <input type="password" id="password" name="password" autocomplete="off" placeholder="••••••••">
            </div>
            <button type="submit">[ ATTEMPT_LOGIN ]</button>
        </form>
        <div id="message"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageEl = document.getElementById('message');

            messageEl.textContent = 'Authenticating...';
            messageEl.className = '';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    messageEl.innerHTML = `[✓] ${data.message}<br><br>FLAG DISCOVERED:<br><strong style="color:#00ff00">${data.flag}</strong>`;
                    messageEl.className = 'success';
                } else {
                    messageEl.textContent = `[!] Error: ${data.message}`;
                    messageEl.className = 'error';
                }
            } catch (err) {
                messageEl.textContent = '[!] System failure. Check connection.';
                messageEl.className = 'error';
            }
        });
    </script>
</body>
</html>
